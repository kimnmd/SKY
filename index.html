function Tag({ label, styleMap, small }) {
  const s = styleMap && styleMap[label];
  if (!s) return <span style={{ fontSize: small ? 11 : 12, color: "var(--text-secondary)" }}>{label}</span>;
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", fontSize: small ? 11 : 12,
      fontWeight: 400, padding: "2px 8px", borderRadius: 3,
      background: s.bg, color: s.color, whiteSpace: "nowrap", lineHeight: "20px",
    }}>{label}</span>
  );
}

function PhaseTag({ label, small }) {
  const c = PHASE_COLORS[label] || "var(--text-secondary)";
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", fontSize: small ? 11 : 12,
      fontWeight: 400, padding: "2px 8px", borderRadius: 3,
      background: c + "18", color: c, whiteSpace: "nowrap", lineHeight: "20px",
    }}>{label}</span>
  );
}

/* ── NSelect ── */
function NSelect({ value, options, styleMap, onChange, phaseMode }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  const dropRef = useRef(null);

  useEffect(() => {
    if (!open) return;
    const handler = (e) => {
      if (ref.current && !ref.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [open]);

  useEffect(() => {
    if (open && dropRef.current) {
      const rect = dropRef.current.getBoundingClientRect();
      if (rect.bottom > window.innerHeight) {
        dropRef.current.style.top = "auto";
        dropRef.current.style.bottom = "100%";
        dropRef.current.style.marginBottom = "4px";
        dropRef.current.style.marginTop = "0";
      }
      if (rect.right > window.innerWidth) {
        dropRef.current.style.left = "auto";
        dropRef.current.style.right = "0";
      }
    }
  }, [open]);

  return (
    <div ref={ref} style={{ position: "relative", display: "inline-block" }}>
      <div onClick={(e) => { e.stopPropagation(); setOpen(!open); }}
        style={{ cursor: "pointer", borderRadius: 4, padding: "2px 4px", transition: "background 20ms ease-in" }}
        onMouseEnter={e => e.currentTarget.style.background = "var(--hover-bg)"}
        onMouseLeave={e => e.currentTarget.style.background = "transparent"}
      >
        {phaseMode ? <PhaseTag label={value}/> : <Tag label={value} styleMap={styleMap}/>}
      </div>
      {open && (
        <div ref={dropRef} style={{
          position: "absolute", top: "100%", left: 0, marginTop: 4, zIndex: 1000,
          background: "#fff", borderRadius: 6, padding: "6px 0", minWidth: 180,
          boxShadow: "var(--popover-shadow)",
        }}>
          {options.map(opt => (
            <div key={opt}
              onClick={(e) => { e.stopPropagation(); onChange(opt); setOpen(false); }}
              style={{
                padding: "6px 14px", cursor: "pointer",
                background: opt === value ? "var(--light-bg)" : "transparent",
                transition: "background 20ms ease-in",
              }}
              onMouseEnter={e => e.currentTarget.style.background = "var(--light-bg)"}
              onMouseLeave={e => e.currentTarget.style.background = opt === value ? "var(--light-bg)" : "transparent"}
            >
              {phaseMode ? <PhaseTag label={opt}/> : <Tag label={opt} styleMap={styleMap}/>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── Email Template Panel ── */
function EmailTemplatePanel({ task }) {
  const templates = getEmailTemplates(task);
  const [activeIdx, setActiveIdx] = useState(0);
  const [copied, setCopied] = useState(null);

  const copyToClipboard = (text, which) => {
    navigator.clipboard.writeText(text).then(() => {
      setCopied(which);
      setTimeout(() => setCopied(null), 2000);
    });
  };

  if (!templates || templates.length === 0) return null;
  const tpl = templates[activeIdx] || templates[0];

  return (
    <div style={{ marginTop: 20 }}>
      <div style={{
        display: "flex", alignItems: "center", gap: 8, marginBottom: 10,
      }}>
        <Icon name="send" size={14} color="var(--text-secondary)"/>
        <span style={{ fontSize: 12, color: "var(--text-secondary)", fontWeight: 500 }}>Email Templates</span>
      </div>

      {/* Template tabs */}
      {templates.length > 1 && (
        <div style={{ display: "flex", gap: 4, marginBottom: 8, flexWrap: "wrap" }}>
          {templates.map((t, i) => (
            <button key={i} onClick={() => setActiveIdx(i)} style={{
              fontSize: 11, padding: "4px 10px", borderRadius: 3, cursor: "pointer",
              border: i === activeIdx ? "1px solid var(--blue)" : "1px solid var(--border)",
              background: i === activeIdx ? "var(--blue)" + "10" : "#fff",
              color: i === activeIdx ? "var(--blue)" : "var(--text-secondary)",
              fontWeight: i === activeIdx ? 500 : 400,
              transition: "all 20ms ease-in",
            }}
              onMouseEnter={e => { if (i !== activeIdx) e.currentTarget.style.background = "var(--hover-bg)"; }}
              onMouseLeave={e => { if (i !== activeIdx) e.currentTarget.style.background = "#fff"; }}
            >{t.label}</button>
          ))}
        </div>
      )}

      {/* Email preview */}
      <div style={{
        border: "1px solid var(--border)", borderRadius: 6, overflow: "hidden",
        background: "var(--light-bg)",
      }}>
        {/* To / Subject header */}
        <div style={{ padding: "10px 14px", borderBottom: "1px solid var(--border)", background: "#fff" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6 }}>
            <span style={{ fontSize: 11, color: "var(--text-light)", width: 50, flexShrink: 0 }}>To:</span>
            <span style={{ fontSize: 12, color: "var(--text)" }}>{tpl.to}</span>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <span style={{ fontSize: 11, color: "var(--text-light)", width: 50, flexShrink: 0 }}>Subject:</span>
            <span style={{ fontSize: 12, color: "var(--text)", fontWeight: 500, flex: 1 }}>{tpl.subject}</span>
            <button onClick={() => copyToClipboard(tpl.subject, "subject")} style={{
              fontSize: 10, padding: "2px 8px", borderRadius: 3, cursor: "pointer",
              border: "1px solid var(--border)", background: "#fff",
              color: copied === "subject" ? "var(--green)" : "var(--text-secondary)",
              transition: "all 20ms ease-in", flexShrink: 0,
            }}
              onMouseEnter={e => e.currentTarget.style.background = "var(--hover-bg)"}
              onMouseLeave={e => e.currentTarget.style.background = "#fff"}
            >{copied === "subject" ? "Copied!" : "Copy"}</button>
          </div>
        </div>

        {/* Body */}
        <div style={{ padding: "12px 14px", position: "relative" }}>
          <pre style={{
            fontSize: 12, lineHeight: 1.6, color: "var(--text)",
            whiteSpace: "pre-wrap", wordBreak: "break-word",
            fontFamily: "var(--font)", margin: 0, background: "transparent",
          }}>{tpl.body}</pre>
        </div>

        {/* Action bar */}
        <div style={{
          display: "flex", gap: 6, padding: "8px 14px",
          borderTop: "1px solid var(--border)", background: "#fff",
        }}>
          <button onClick={() => copyToClipboard(tpl.body, "body")} style={{
            display: "flex", alignItems: "center", gap: 5, fontSize: 12, padding: "5px 14px",
            borderRadius: 4, cursor: "pointer", fontWeight: 500,
            border: "none", background: "var(--blue)", color: "#fff",
            transition: "background 20ms ease-in",
          }}
            onMouseEnter={e => e.currentTarget.style.background = "var(--blue-hover)"}
            onMouseLeave={e => e.currentTarget.style.background = "var(--blue)"}
          >
            {copied === "body" ? <><Icon name="check" size={13} color="#fff"/> Copied!</> : <><Icon name="clipboardList" size={13} color="#fff"/> Copy body</>}
          </button>
          <button onClick={() => copyToClipboard(`Subject: ${tpl.subject}\n\n${tpl.body}`, "all")} style={{
            display: "flex", alignItems: "center", gap: 5, fontSize: 12, padding: "5px 14px",
            borderRadius: 4, cursor: "pointer",
            border: "1px solid var(--border)", background: "#fff", color: "var(--text-secondary)",
            transition: "background 20ms ease-in",
          }}
            onMouseEnter={e => e.currentTarget.style.background = "var(--hover-bg)"}
            onMouseLeave={e => e.currentTarget.style.background = "#fff"}
          >
            {copied === "all" ? <><Icon name="check" size={13}/> Copied!</> : "Copy all"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── Dashboard ── */
function DashboardView({ tasks }) {
  const total = tasks.length;
  const done = tasks.filter(t => t.status === "Done").length;
  const inProg = tasks.filter(t => t.status === "In progress").length;
  const overdue = tasks.filter(t => isOverdue(t)).length;
  const statusCounts = STATUSES.map(s => ({ label: s, count: tasks.filter(t => t.status === s).length }));
  const hires = [...new Set(tasks.map(t => t.hire))];

  const donutSize = 160, donutR = 58, donutStroke = 22;
  const circ = 2 * Math.PI * donutR;
  let offset = 0;
  const segs = statusCounts.map(s => {
    const pct = total > 0 ? s.count / total : 0;
    const seg = { ...s, pct, offset, len: pct * circ };
    offset += seg.len;
    return seg;
  });

  const statCards = [
    { label: "Total tasks", value: total, icon: "clipboardList", color: "var(--blue)" },
    { label: "Completed", value: done, icon: "checkCircle", color: "var(--green)" },
    { label: "In progress", value: inProg, icon: "clock", color: "var(--blue)" },
    { label: "Overdue", value: overdue, icon: "alert", color: "var(--red)" },
  ];

  return (
    <div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12, marginBottom: 28 }}>
        {statCards.map(c => (
          <div key={c.label} style={{ padding: "16px 18px", borderRadius: 4, boxShadow: "var(--card-shadow)" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
              <Icon name={c.icon} size={16} color={c.color}/>
              <span style={{ fontSize: 12, color: "var(--text-secondary)" }}>{c.label}</span>
            </div>
            <div style={{ fontSize: 28, fontWeight: 700, color: "var(--text)" }}>{c.value}</div>
          </div>
        ))}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 28 }}>
        <div style={{ boxShadow: "var(--card-shadow)", borderRadius: 4, padding: 20 }}>
          <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 16 }}>Status overview</div>
          <div style={{ display: "flex", alignItems: "center", gap: 24 }}>
            <svg width={donutSize} height={donutSize} viewBox={`0 0 ${donutSize} ${donutSize}`}>
              {segs.map(s => {
                const strokeColor = s.label === "Not started" ? "#d8d8d5" : STATUS_STYLES[s.label].color;
                return (
                  <circle key={s.label} cx={donutSize/2} cy={donutSize/2} r={donutR}
                    fill="none" stroke={strokeColor} strokeWidth={donutStroke}
                    strokeDasharray={`${s.len} ${circ - s.len}`}
                    strokeDashoffset={-s.offset}
                    transform={`rotate(-90 ${donutSize/2} ${donutSize/2})`}/>
                );
              })}
              <text x={donutSize/2} y={donutSize/2 - 6} textAnchor="middle"
                fontSize="24" fontWeight="700" fill="var(--text)">
                {total > 0 ? Math.round(done / total * 100) : 0}%
              </text>
              <text x={donutSize/2} y={donutSize/2 + 14} textAnchor="middle"
                fontSize="11" fill="var(--text-secondary)">complete</text>
            </svg>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {statusCounts.map(s => (
                <div key={s.label} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13 }}>
                  <div style={{ width: 8, height: 8, borderRadius: 2, background: STATUS_STYLES[s.label].color }}/>
                  <span style={{ color: "var(--text-secondary)", minWidth: 80 }}>{s.label}</span>
                  <span style={{ fontWeight: 600 }}>{s.count}</span>
                </div>
              ))}
            </div>
          </div>
        </div>

        <div style={{ boxShadow: "var(--card-shadow)", borderRadius: 4, padding: 20 }}>
          <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 16 }}>Phase progress</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {PHASES.map(p => {
              const pt = tasks.filter(t => t.phase === p);
              const pd = pt.filter(t => t.status === "Done").length;
              const pct = pt.length > 0 ? pd / pt.length * 100 : 0;
              return (
                <div key={p}>
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 4 }}>
                    <span style={{ color: PHASE_COLORS[p], fontWeight: 500 }}>{p}</span>
                    <span style={{ color: "var(--text-light)" }}>{pd}/{pt.length}</span>
                  </div>
                  <div style={{ height: 6, background: "var(--light-bg)", borderRadius: 3 }}>
                    <div style={{ height: "100%", borderRadius: 3, width: pct + "%", background: PHASE_COLORS[p], transition: "width 300ms" }}/>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      <div style={{ boxShadow: "var(--card-shadow)", borderRadius: 4, padding: 20 }}>
        <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 16 }}>New hire progress</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          {hires.map(h => {
            const ht = tasks.filter(t => t.hire === h);
            const hd = ht.filter(t => t.status === "Done").length;
            const pct = ht.length > 0 ? hd / ht.length * 100 : 0;
            return (
              <div key={h}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 4 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <div style={{
                      width: 22, height: 22, borderRadius: "50%", background: "#e3e2e0",
                      display: "flex", alignItems: "center", justifyContent: "center",
                      fontSize: 10, fontWeight: 600, color: "var(--text-secondary)",
                    }}>{h.split(" ").map(n => n[0]).join("")}</div>
                    <span>{h}</span>
                  </div>
                  <span style={{ color: "var(--text-light)", fontSize: 12 }}>{hd}/{ht.length} ({Math.round(pct)}%)</span>
                </div>
                <div style={{ height: 6, background: "var(--light-bg)", borderRadius: 3 }}>
                  <div style={{ height: "100%", borderRadius: 3, width: pct + "%", background: "var(--blue)", transition: "width 300ms" }}/>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ── Table View ── */
function TableView({ tasks, onUpdate, onDelete, onEdit }) {
  const [sortKey, setSortKey] = useState(null);
  const [sortDir, setSortDir] = useState("asc");
  const toggleSort = (key) => {
    if (sortKey === key) setSortDir(d => d === "asc" ? "desc" : "asc");
    else { setSortKey(key); setSortDir("asc"); }
  };
  const prioOrder = { High: 0, Medium: 1, Low: 2 };
  const sorted = useMemo(() => {
    if (!sortKey) return tasks;
    return [...tasks].sort((a, b) => {
      let va = a[sortKey], vb = b[sortKey];
      if (sortKey === "priority") { va = prioOrder[va]; vb = prioOrder[vb]; }
      if (va < vb) return sortDir === "asc" ? -1 : 1;
      if (va > vb) return sortDir === "asc" ? 1 : -1;
      return 0;
    });
  }, [tasks, sortKey, sortDir]);

  const thStyle = (sortable) => ({
    textAlign: "left", padding: "8px 10px", borderBottom: "1px solid var(--border)",
    background: "var(--light-bg)", fontSize: 12, fontWeight: 400,
    color: "var(--text-secondary)", whiteSpace: "nowrap",
    cursor: sortable ? "pointer" : "default", userSelect: "none",
  });

  return (
    <div style={{ border: "1px solid var(--border)", overflow: "auto" }}>
      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13, tableLayout: "auto" }}>
        <thead>
          <tr>
            <th style={{ ...thStyle(true), minWidth: 200 }} onClick={() => toggleSort("title")}>
              Title {sortKey === "title" && (sortDir === "asc" ? "\u2191" : "\u2193")}
            </th>
            <th style={{ ...thStyle(false), width: 130 }}>Status</th>
            <th style={{ ...thStyle(true), width: 110 }} onClick={() => toggleSort("priority")}>
              Priority {sortKey === "priority" && (sortDir === "asc" ? "\u2191" : "\u2193")}
            </th>
            <th style={{ ...thStyle(false), width: 120 }}>Phase</th>
            <th style={{ ...thStyle(false), width: 120 }}>New Hire</th>
            <th style={{ ...thStyle(false), width: 110 }}>Assignee</th>
            <th style={{ ...thStyle(true), width: 110 }} onClick={() => toggleSort("due")}>
              Due date {sortKey === "due" && (sortDir === "asc" ? "\u2191" : "\u2193")}
            </th>
            <th style={{ ...thStyle(false), width: 40 }}></th>
          </tr>
        </thead>
        <tbody>
          {sorted.map(task => {
            const od = isOverdue(task);
            const isDone = task.status === "Done";
            return (
              <tr key={task.id} style={{ transition: "background 20ms ease-in" }}
                onMouseEnter={e => {
                  e.currentTarget.style.background = "var(--light-bg)";
                  const btn = e.currentTarget.querySelector(".del-btn");
                  if (btn) btn.style.opacity = "0.4";
                }}
                onMouseLeave={e => {
                  e.currentTarget.style.background = "";
                  const btn = e.currentTarget.querySelector(".del-btn");
                  if (btn) btn.style.opacity = "0";
                }}
              >
                <td style={{
                  padding: "8px 10px", borderBottom: "1px solid var(--border)", cursor: "pointer",
                  textDecoration: isDone ? "line-through" : "none",
                  color: isDone ? "var(--text-light)" : "var(--text)",
                }} onClick={() => onEdit(task)}>{task.title}</td>
                <td style={{ padding: "6px 10px", borderBottom: "1px solid var(--border)" }}>
                  <NSelect value={task.status} options={STATUSES} styleMap={STATUS_STYLES}
                    onChange={v => onUpdate(task.id, "status", v)}/>
                </td>
                <td style={{ padding: "6px 10px", borderBottom: "1px solid var(--border)" }}>
                  <NSelect value={task.priority} options={PRIORITIES} styleMap={PRIORITY_STYLES}
                    onChange={v => onUpdate(task.id, "priority", v)}/>
                </td>
                <td style={{ padding: "6px 10px", borderBottom: "1px solid var(--border)" }}>
                  <PhaseTag label={task.phase} small/>
                </td>
                <td style={{ padding: "8px 10px", borderBottom: "1px solid var(--border)", fontSize: 13 }}>{task.hire}</td>
                <td style={{
                  padding: "8px 10px", borderBottom: "1px solid var(--border)", fontSize: 13,
                  color: task.assignee ? "var(--text)" : "var(--text-light)",
                }}>{task.assignee || "\u2014"}</td>
                <td style={{
                  padding: "8px 10px", borderBottom: "1px solid var(--border)", fontSize: 12,
                  color: od ? "var(--red)" : isDone ? "var(--text-light)" : "var(--text-secondary)",
                  fontWeight: od ? 500 : 400,
                }}>{task.due || "\u2014"}</td>
                <td style={{ padding: "4px 6px", borderBottom: "1px solid var(--border)", textAlign: "center" }}>
                  <button className="del-btn" onClick={(e) => { e.stopPropagation(); onDelete(task.id); }}
                    style={{
                      background: "transparent", border: "none", cursor: "pointer", padding: 4,
                      borderRadius: 4, opacity: 0, transition: "opacity 100ms, background 20ms ease-in",
                    }}
                    onMouseEnter={e => { e.currentTarget.style.opacity = "1"; e.currentTarget.style.background = "var(--hover-bg)"; }}
                    onMouseLeave={e => { e.currentTarget.style.opacity = "0.4"; e.currentTarget.style.background = "transparent"; }}
                  ><Icon name="trash" size={14} color="var(--text-secondary)"/></button>
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

/* ── Kanban ── */
function KanbanView({ tasks, onUpdate, onEdit }) {
  const [dragId, setDragId] = useState(null);
  const [dragOver, setDragOver] = useState(null);

  const handleDrop = (e, status) => {
    e.preventDefault();
    setDragOver(null);
    if (dragId) {
      onUpdate(dragId, "status", status);
      setDragId(null);
    }
  };

  return (
    <div style={{ display: "grid", gridTemplateColumns: `repeat(${STATUSES.length}, 1fr)`, gap: 10, minHeight: 400, alignItems: "start" }}>
      {STATUSES.map(status => {
        const col = tasks.filter(t => t.status === status);
        const isOver = dragOver === status && dragId;
        return (
          <div key={status}
            onDragOver={e => { e.preventDefault(); setDragOver(status); }}
            onDragLeave={() => setDragOver(null)}
            onDrop={e => handleDrop(e, status)}
            style={{
              minWidth: 0, borderRadius: 6, padding: 6, minHeight: 120,
              background: isOver ? "rgba(35,131,226,0.06)" : "var(--light-bg)",
              border: isOver ? "2px dashed var(--blue)" : "2px solid transparent",
              transition: "background 100ms, border-color 100ms",
            }}
          >
            <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 6px", marginBottom: 4 }}>
              <Tag label={status} styleMap={STATUS_STYLES}/>
              <span style={{ fontSize: 12, color: "var(--text-light)" }}>{col.length}</span>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {col.map(task => (
                <div key={task.id} draggable
                  onDragStart={e => { setDragId(task.id); e.dataTransfer.effectAllowed = "move"; }}
                  onDragEnd={() => { setDragId(null); setDragOver(null); }}
                  onClick={() => onEdit(task)}
                  style={{
                    background: "#fff", borderRadius: 4, padding: "10px 12px",
                    cursor: "grab", boxShadow: "var(--card-shadow)",
                    opacity: dragId === task.id ? 0.5 : 1,
                    transition: "background 20ms ease-in, opacity 100ms",
                  }}
                  onMouseEnter={e => e.currentTarget.style.background = "var(--light-bg)"}
                  onMouseLeave={e => e.currentTarget.style.background = "#fff"}
                >
                  <div style={{
                    fontSize: 13, marginBottom: 8,
                    color: task.status === "Done" ? "var(--text-light)" : "var(--text)",
                    textDecoration: task.status === "Done" ? "line-through" : "none",
                  }}>{task.title}</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginBottom: 6 }}>
                    <PhaseTag label={task.phase} small/>
                    <Tag label={task.priority} styleMap={PRIORITY_STYLES} small/>
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 12, color: "var(--text-secondary)" }}>
                    <span>{task.hire}</span>
                    <span style={{ color: isOverdue(task) ? "var(--red)" : "var(--text-light)", fontSize: 11 }}>{task.due}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ── Gantt / Timeline (fits one page) ── */
function GanttView({ tasks, onUpdate, onEdit }) {
  const hires = [...new Set(tasks.map(t => t.hire))];
  const [expanded, setExpanded] = useState(() => {
    const s = {};
    hires.forEach(h => s[h] = true);
    return s;
  });

  const allDates = tasks.filter(t => t.due).map(t => new Date(t.due + "T00:00:00").getTime());
  const td = todayStr();
  const todayMs = new Date(td + "T00:00:00").getTime();
  allDates.push(todayMs);
  if (allDates.length === 0) return <div style={{ padding: 20, color: "var(--text-secondary)" }}>No tasks with due dates.</div>;

  const minMs = Math.min(...allDates) - 86400000 * 7;
  const maxMs = Math.max(...allDates) + 86400000 * 7;
  const totalDays = Math.max(1, Math.ceil((maxMs - minMs) / 86400000));

  // Percentage-based positioning (fits any width)
  const getPct = (ds) => {
    const d = new Date(ds + "T00:00:00").getTime();
    return ((d - minMs) / (maxMs - minMs)) * 100;
  };
  const todayPct = getPct(td);

  // Build month labels
  const months = [];
  const cursor = new Date(minMs);
  cursor.setDate(1);
  while (cursor.getTime() <= maxMs) {
    const mStart = Math.max(cursor.getTime(), minMs);
    const nextMonth = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 1);
    const mEnd = Math.min(nextMonth.getTime(), maxMs);
    const leftPct = ((mStart - minMs) / (maxMs - minMs)) * 100;
    const widthPct = ((mEnd - mStart) / (maxMs - minMs)) * 100;
    if (widthPct > 0) {
      months.push({
        label: cursor.toLocaleDateString("en-US", { month: "short", year: "numeric" }),
        left: leftPct, width: widthPct,
      });
    }
    cursor.setMonth(cursor.getMonth() + 1);
  }

  // Build week lines
  const weekLines = [];
  const wCursor = new Date(minMs);
  wCursor.setDate(wCursor.getDate() - wCursor.getDay() + 1); // Monday
  while (wCursor.getTime() <= maxMs) {
    const pct = ((wCursor.getTime() - minMs) / (maxMs - minMs)) * 100;
    if (pct > 0 && pct < 100) weekLines.push(pct);
    wCursor.setDate(wCursor.getDate() + 7);
  }

  const rowH = 28;
  const hireRowH = 32;
  const labelW = 220;

  return (
    <div style={{ border: "1px solid var(--border)", borderRadius: 4, overflow: "hidden", background: "#fff" }}>
      {/* Header row */}
      <div style={{ display: "flex", borderBottom: "1px solid var(--border)" }}>
        <div style={{
          width: labelW, flexShrink: 0, padding: "6px 10px", fontSize: 12,
          color: "var(--text-secondary)", borderRight: "1px solid var(--border)",
          background: "var(--light-bg)", fontWeight: 500,
        }}>Employee / Task</div>
        <div style={{ flex: 1, position: "relative", height: 32, background: "var(--light-bg)" }}>
          {months.map((m, i) => (
            <div key={i} style={{
              position: "absolute", left: m.left + "%", width: m.width + "%", height: "100%",
              display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: 11, color: "var(--text-secondary)", fontWeight: 500,
              borderRight: "1px solid var(--border)", overflow: "hidden", whiteSpace: "nowrap",
            }}>{m.label}</div>
          ))}
        </div>
      </div>

      {/* Rows */}
      {hires.map(h => {
        const ht = tasks.filter(t => t.hire === h).sort((a, b) => (a.due || "z").localeCompare(b.due || "z"));
        const hd = ht.filter(t => t.status === "Done").length;
        const isExp = expanded[h];

        return (
          <React.Fragment key={h}>
            {/* Hire header row */}
            <div style={{ display: "flex", borderBottom: "1px solid var(--border)", cursor: "pointer" }}
              onClick={() => setExpanded(e => ({ ...e, [h]: !e[h] }))}>
              <div style={{
                width: labelW, flexShrink: 0, height: hireRowH, display: "flex", alignItems: "center",
                gap: 6, padding: "0 10px", borderRight: "1px solid var(--border)",
                fontSize: 13, fontWeight: 500, background: "var(--light-bg)",
                transition: "background 20ms ease-in",
              }}
                onMouseEnter={e => e.currentTarget.style.background = "var(--hover-bg)"}
                onMouseLeave={e => e.currentTarget.style.background = "var(--light-bg)"}
              >
                <Icon name={isExp ? "chevronDown" : "chevronRight"} size={11}/>
                <div style={{
                  width: 20, height: 20, borderRadius: "50%", background: "#e3e2e0",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: 9, fontWeight: 600, color: "var(--text-secondary)", flexShrink: 0,
                }}>{h.split(" ").map(n => n[0]).join("")}</div>
                <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", flex: 1 }}>{h}</span>
                <span style={{ fontSize: 11, color: "var(--text-light)", flexShrink: 0 }}>{hd}/{ht.length}</span>
              </div>
              <div style={{ flex: 1, position: "relative", height: hireRowH, background: "var(--light-bg)" }}>
                {/* Week grid lines */}
                {weekLines.map((pct, i) => (
                  <div key={i} style={{ position: "absolute", left: pct + "%", top: 0, bottom: 0, width: 1, background: "#f0f0ee", pointerEvents: "none" }}/>
                ))}
                {/* Today line */}
                <div style={{ position: "absolute", left: todayPct + "%", top: 0, bottom: 0, width: 2, background: "var(--red)", opacity: 0.4, zIndex: 2, pointerEvents: "none" }}/>
                {/* Summary bar for collapsed */}
                {!isExp && ht.length > 0 && (() => {
                  const dates = ht.filter(t => t.due).map(t => t.due).sort();
                  if (dates.length === 0) return null;
                  const startPct = getPct(dates[0]);
                  const endPct = getPct(dates[dates.length - 1]);
                  const donePct = ht.length ? (hd / ht.length) * (endPct - startPct) : 0;
                  return (
                    <>
                      <div style={{
                        position: "absolute", top: 8, height: 16, borderRadius: 8,
                        left: startPct + "%", width: Math.max(endPct - startPct, 1) + "%",
                        background: "#e3e2e0",
                      }}/>
                      <div style={{
                        position: "absolute", top: 8, height: 16, borderRadius: 8,
                        left: startPct + "%", width: Math.max(donePct, 0) + "%",
                        background: "var(--green)", opacity: 0.6,
                      }}/>
                    </>
                  );
                })()}
              </div>
            </div>

            {/* Task rows */}
            {isExp && ht.map(t => {
              const phaseCol = PHASE_COLORS[t.phase] || "#999";
              const isDone = t.status === "Done";
              const od = isOverdue(t);
              return (
                <div key={t.id} style={{ display: "flex", borderBottom: "1px solid var(--border)" }}>
                  <div style={{
                    width: labelW, flexShrink: 0, height: rowH, display: "flex", alignItems: "center",
                    gap: 6, padding: "0 10px 0 32px", borderRight: "1px solid var(--border)",
                    fontSize: 12, overflow: "hidden",
                  }}>
                    <input type="checkbox" checked={isDone}
                      onChange={() => onUpdate(t.id, "status", isDone ? "Not started" : "Done")}
                      style={{ accentColor: "var(--blue)", cursor: "pointer", flexShrink: 0 }}/>
                    <span onClick={() => onEdit && onEdit(t)} style={{
                      overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                      cursor: onEdit ? "pointer" : "default",
                      color: isDone ? "var(--text-light)" : od ? "var(--red)" : "var(--text)",
                      textDecoration: isDone ? "line-through" : "none",
                    }}
                      onMouseEnter={e => { if (onEdit && !isDone) e.currentTarget.style.textDecoration = "underline"; }}
                      onMouseLeave={e => { e.currentTarget.style.textDecoration = isDone ? "line-through" : "none"; }}
                    >{t.title}</span>
                  </div>
                  <div style={{ flex: 1, position: "relative", height: rowH }}>
                    {/* Week grid lines */}
                    {weekLines.map((pct, i) => (
                      <div key={i} style={{ position: "absolute", left: pct + "%", top: 0, bottom: 0, width: 1, background: "#f5f5f3", pointerEvents: "none" }}/>
                    ))}
                    {/* Today line */}
                    <div style={{ position: "absolute", left: todayPct + "%", top: 0, bottom: 0, width: 2, background: "var(--red)", opacity: 0.3, zIndex: 2, pointerEvents: "none" }}/>
                    {/* Task bar */}
                    {t.due && (() => {
                      const leftPct = getPct(t.due);
                      const barW = Math.max(100 / totalDays * 5, 2); // at least 5 days wide visually
                      return (
                        <div title={`${t.title} — ${t.due}`} style={{
                          position: "absolute", top: 5, height: 18, borderRadius: 4,
                          left: `calc(${leftPct}% - ${barW/2}%)`, width: barW + "%",
                          background: isDone ? "#dbeddb" : phaseCol + (od ? "60" : "30"),
                          border: `1.5px solid ${isDone ? "#0f7b6c50" : od ? "var(--red)" + "80" : phaseCol + "70"}`,
                          display: "flex", alignItems: "center", justifyContent: "center",
                          fontSize: 9, color: isDone ? "var(--green)" : phaseCol,
                          fontWeight: 600, overflow: "hidden", whiteSpace: "nowrap",
                          cursor: "default",
                        }}>
                          {barW > 4 && <span style={{ padding: "0 3px", opacity: 0.8 }}>
                            {new Date(t.due + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" })}
                          </span>}
                        </div>
                      );
                    })()}
                  </div>
                </div>
              );
            })}
          </React.Fragment>
        );
      })}

      {/* Legend */}
      <div style={{
        display: "flex", gap: 14, padding: "8px 12px", flexWrap: "wrap",
        borderTop: "1px solid var(--border)", background: "var(--light-bg)",
      }}>
        <span style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11, color: "var(--text-secondary)" }}>
          <div style={{ width: 2, height: 12, background: "var(--red)", opacity: 0.5 }}/> Today

function ImportModal({ onClose, onImport }) {
  const [data, setData] = useState(null);
  const [fileName, setFileName] = useState("");
  const [mapping, setMapping] = useState({});
  const [mode, setMode] = useState("replace");
  const fields = ["title", "status", "priority", "phase", "hire", "assignee", "due", "notes"];

  const handleFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setFileName(file.name);
    const reader = new FileReader();
    reader.onload = (ev) => {
      const text = ev.target.result;
      const lines = text.split(/\r?\n/).filter(l => l.trim());
      if (lines.length < 2) return;
      const sep = lines[0].includes("\t") ? "\t" : ",";
      const headers = lines[0].split(sep).map(h => h.trim().replace(/^"|"$/g, ""));
      const rows = lines.slice(1).map(l => {
        const vals = l.split(sep).map(v => v.trim().replace(/^"|"$/g, ""));
        const obj = {};
        headers.forEach((h, i) => obj[h] = vals[i] || "");
        return obj;
      });
      setData({ headers, rows });
      const m = {};
      fields.forEach(f => {
        const match = headers.find(h => h.toLowerCase().replace(/[_\s]/g, "") === f.toLowerCase());
        if (match) m[f] = match;
        else {
          const partial = headers.find(h => h.toLowerCase().includes(f.toLowerCase()));
          if (partial) m[f] = partial;
        }
      });
      setMapping(m);
    };
    reader.readAsText(file);
  };

  const doImport = () => {
    if (!data) return;
    const imported = data.rows.map(row => ({
      id: genId(),
      title: row[mapping.title] || "Untitled",
      status: STATUSES.includes(row[mapping.status]) ? row[mapping.status] : "Not started",
      priority: PRIORITIES.includes(row[mapping.priority]) ? row[mapping.priority] : "Medium",
      phase: PHASES.includes(row[mapping.phase]) ? row[mapping.phase] : "Pre-boarding",
      hire: row[mapping.hire] || "Unassigned",
      assignee: row[mapping.assignee] || "",
      due: row[mapping.due] || "",
      notes: row[mapping.notes] || "",
    }));
    onImport(imported, mode);
    onClose();
  };

  return (
    <div style={{
      position: "fixed", inset: 0, zIndex: 3000, display: "flex",
      alignItems: "center", justifyContent: "center", background: "rgba(15,15,15,0.6)",
    }} onClick={onClose}>
      <div style={{
        background: "#fff", borderRadius: 6, width: 600, maxWidth: "95vw",
        maxHeight: "85vh", overflow: "auto", boxShadow: "var(--popover-shadow)", padding: 24,
      }} onClick={e => e.stopPropagation()}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <div style={{ fontSize: 16, fontWeight: 600 }}>Import from CSV / Excel</div>
          <button onClick={onClose} style={{
            background: "transparent", border: "none", cursor: "pointer", padding: 4, borderRadius: 4,
          }}><Icon name="x" size={18}/></button>
        </div>
        <div style={{
          border: "2px dashed var(--border)", borderRadius: 6, padding: 24,
          textAlign: "center", marginBottom: 16,
        }}>
          <Icon name="upload" size={24} color="var(--text-light)"/>
          <div style={{ fontSize: 13, color: "var(--text-secondary)", margin: "8px 0" }}>
            {fileName || "Choose a CSV or TSV file"}
          </div>
          <label style={{
            background: "var(--blue)", color: "#fff", padding: "6px 14px",
            borderRadius: 4, fontSize: 13, cursor: "pointer", display: "inline-block",
          }}>
            Browse
            <input type="file" accept=".csv,.tsv,.txt" onChange={handleFile} style={{ display: "none" }}/>
          </label>
        </div>
        {data && (
          <>
            <div style={{ fontSize: 12, color: "var(--text-secondary)", marginBottom: 12 }}>
              {data.rows.length} rows, {data.headers.length} columns detected
            </div>
            <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8 }}>Column mapping</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 16 }}>
              {fields.map(f => (
                <div key={f} style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ fontSize: 12, color: "var(--text-secondary)", width: 70, textTransform: "capitalize" }}>{f}</span>
                  <select value={mapping[f] || ""} onChange={e => setMapping(m => ({ ...m, [f]: e.target.value }))} style={{
                    flex: 1, border: "1px solid var(--border)", borderRadius: 4,
                    padding: "4px 6px", fontSize: 12, outline: "none", background: "#fff",
                  }}>
                    <option value="">-- skip --</option>
                    {data.headers.map(h => <option key={h} value={h}>{h}</option>)}
                  </select>
                </div>
              ))}
            </div>
            <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8 }}>Preview (first 3 rows)</div>
            <div style={{ overflowX: "auto", marginBottom: 16 }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11 }}>
                <thead>
                  <tr>{data.headers.map(h => (
                    <th key={h} style={{
                      padding: "4px 8px", borderBottom: "1px solid var(--border)",
                      textAlign: "left", color: "var(--text-secondary)", fontWeight: 400, whiteSpace: "nowrap",
                    }}>{h}</th>
                  ))}</tr>
                </thead>
                <tbody>
                  {data.rows.slice(0, 3).map((row, i) => (
                    <tr key={i}>{data.headers.map(h => (
                      <td key={h} style={{
                        padding: "4px 8px", borderBottom: "1px solid var(--border)",
                        whiteSpace: "nowrap", maxWidth: 150, overflow: "hidden", textOverflow: "ellipsis",
                      }}>{row[h]}</td>
                    ))}</tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8 }}>Import mode</div>
            <div style={{ display: "flex", gap: 16, marginBottom: 20 }}>
              {[["replace", "Replace all"], ["add", "Add to existing"]].map(([v, l]) => (
                <label key={v} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 13, cursor: "pointer" }}>
                  <input type="radio" name="importmode" checked={mode === v}
                    onChange={() => setMode(v)} style={{ accentColor: "var(--blue)" }}/>
                  {l}
                </label>
              ))}
            </div>
            <button onClick={doImport} style={{
              background: "var(--blue)", color: "#fff", border: "none", borderRadius: 4,
              padding: "8px 20px", fontSize: 13, cursor: "pointer", fontWeight: 500,
            }}>Import {data.rows.length} tasks</button>
          </>
        )}
      </div>
    </div>
  );
}

const GEMINI_KEY = "AIzaSyDsEfWUvuJ2-Y8VDTapFMRgp9GsJJUP_Kw";
const GEMINI_MODELS = ["gemini-2.5-flash", "gemini-2.0-flash", "gemini-2.0-flash-lite"];

async function askGemini(prompt, systemInstruction, retries = 2) {
  for (let mi = 0; mi < GEMINI_MODELS.length; mi++) {
    const model = GEMINI_MODELS[mi];
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${GEMINI_KEY}`;
    const body = { contents: [{ parts: [{ text: prompt }] }] };
    if (systemInstruction) {
      body.systemInstruction = { parts: [{ text: systemInstruction }] };
    }
    for (let attempt = 0; attempt <= retries; attempt++) {
      try {
        if (attempt > 0) await new Promise(r => setTimeout(r, 2000 * attempt));
        const res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        if (res.status === 429) {
          if (attempt < retries) continue;
          if (mi < GEMINI_MODELS.length - 1) break; // try next model
          throw new Error("Rate limited — free tier quota reached. Please wait a minute and try again.");
        }
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error?.message || `API error ${res.status}`);
        }
        const data = await res.json();
        return data.candidates?.[0]?.content?.parts?.[0]?.text || "No response received.";
      } catch (e) {
        if (attempt === retries && mi === GEMINI_MODELS.length - 1) throw e;
        if (e.message.includes("Rate limited")) throw e;
      }
    }
  }
  throw new Error("All models failed. Please try again later.");
}

function AIInsights({ tasks }) {
  const [insight, setInsight] = useState(null);
  const [loading, setLoading] = useState(false);

  const generate = async () => {
    setLoading(true);
    try {
      const total = tasks.length;
      const done = tasks.filter(t => t.status === "Done").length;
      const overdue = tasks.filter(t => isOverdue(t)).length;
      const inProg = tasks.filter(t => t.status === "In progress").length;
      const hires = [...new Set(tasks.map(t => t.hire))];
      const hireStats = hires.map(h => {
        const ht = tasks.filter(t => t.hire === h);
        return `${h}: ${ht.filter(t=>t.status==="Done").length}/${ht.length} done, ${ht.filter(t=>isOverdue(t)).length} overdue`;
      }).join("; ");

      const prompt = `Analyze this HR onboarding status and give 3-4 brief, actionable insights:
- Total: ${total} tasks, ${done} completed, ${inProg} in progress, ${overdue} overdue
- Hires: ${hireStats}
- Overdue tasks: ${tasks.filter(t => isOverdue(t)).map(t => `"${t.title}" (${t.hire})`).join(", ") || "none"}

Give concise bullet points with specific actions. Focus on risks and priorities. No fluff.`;

      const reply = await askGemini(prompt, AI_SYSTEM);
      setInsight(reply);
    } catch {
      setInsight("Could not generate insights. Please try again.");
    }
    setLoading(false);
  };

  return (
    <div style={{
      background: "#fff", borderRadius: 4, boxShadow: "var(--card-shadow)",
      padding: "16px 20px", marginTop: 12,
    }}>
      <div style={{
        display: "flex", alignItems: "center", justifyContent: "space-between",
        marginBottom: insight ? 12 : 0,
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{
            width: 22, height: 22, borderRadius: 5, display: "flex", alignItems: "center",
            justifyContent: "center", background: "linear-gradient(135deg, #8B5CF6, #2383e2)",
          }}><Icon name="sparkle" size={12} color="#fff"/></div>
          <span style={{ fontSize: 14, fontWeight: 600 }}>AI Insights</span>
        </div>
        <button onClick={generate} disabled={loading} style={{
          display: "flex", alignItems: "center", gap: 5, padding: "5px 12px",
          borderRadius: 4, border: "1px solid var(--border)", background: "#fff",
          fontSize: 12, cursor: loading ? "wait" : "pointer", color: "var(--text-secondary)",
          transition: "background 20ms ease-in",
        }} onMouseEnter={e => e.currentTarget.style.background = "var(--hover-bg)"}
           onMouseLeave={e => e.currentTarget.style.background = "#fff"}>
          {loading ? (
            <><div style={{ width: 12, height: 12, border: "2px solid var(--border)", borderTopColor: "var(--blue)", borderRadius: "50%", animation: "spin 0.6s linear infinite" }}/> Analyzing...</>
          ) : (
            <><Icon name="zap" size={13}/> Generate</>
          )}
        </button>
      </div>
      {insight && (
        <div style={{
          fontSize: 13, lineHeight: 1.7, color: "var(--text)", whiteSpace: "pre-wrap",
          padding: "12px 14px", background: "var(--light-bg)", borderRadius: 4,
          animation: "fadeUp 150ms ease-out",
        }}>{insight}</div>
      )}
    </div>
  );
}

const STORAGE_KEY = "ee_probation_tracker";
const FIRESTORE_DOC = "app_data/tasks";

// Load from localStorage first (instant), then sync from Firestore
function loadSaved() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      if (Array.isArray(data) && data.length > 0) return data;
    }
  } catch {}
  return null;
}

// Save to Firestore (cloud)
let _saveTimer = null;
function saveToCloud(tasks) {
  // Debounce: wait 800ms after last change before saving to cloud
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => {
    try {
      db.doc(FIRESTORE_DOC).set({ tasks: JSON.stringify(tasks), updatedAt: new Date().toISOString() })
        .catch(() => {});
    } catch {}
  }, 800);
}

// Load from Firestore (cloud)
async function loadFromCloud() {
  try {
    const snap = await db.doc(FIRESTORE_DOC).get();
    if (snap.exists) {
      const data = JSON.parse(snap.data().tasks);
      if (Array.isArray(data) && data.length > 0) return data;
    }
  } catch {}
  return null;
}

function App() {
  const [tasks, setTasks] = useState(() => loadSaved() || createInitialTasks());
  const [tab, setTab] = useState("dashboard");
  const [search, setSearch] = useState("");
  const [filterHire, setFilterHire] = useState(null);
  const [peekTask, setPeekTask] = useState(null);
  const [showImport, setShowImport] = useState(false);
  const [sidebarOpen, setSidebarOpen] = useState(true);
  const [aiChatOpen, setAiChatOpen] = useState(false);
  const [aiGenOpen, setAiGenOpen] = useState(false);
  const [lastSaved, setLastSaved] = useState(null);
  const [cloudStatus, setCloudStatus] = useState("syncing"); // "synced", "syncing", "offline"
  const skipNextSave = useRef(false); // prevent save loop on cloud load

  // On first load: pull from Firestore (cloud is source of truth)
  useEffect(() => {
    setCloudStatus("syncing");
    loadFromCloud().then(cloudData => {
      if (cloudData) {
        skipNextSave.current = true; // don't re-save what we just loaded
        setTasks(cloudData);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(cloudData));
        setCloudStatus("synced");
      } else {
        // No cloud data yet — push local data to cloud
        saveToCloud(tasks);
        setCloudStatus("synced");
      }
    }).catch(() => setCloudStatus("offline"));
  }, []);

  // Auto-save to both localStorage AND Firestore on every change
  const isFirstRender = useRef(true);
  useEffect(() => {
    if (isFirstRender.current) { isFirstRender.current = false; return; }
    if (skipNextSave.current) { skipNextSave.current = false; return; }
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
      setLastSaved(new Date());
      setCloudStatus("syncing");
      saveToCloud(tasks);
      clearTimeout(window._syncTimer);
      window._syncTimer = setTimeout(() => setCloudStatus("synced"), 1200);
    } catch {}
  }, [tasks]);

  const allHires = useMemo(() => [...new Set(tasks.map(t => t.hire))], [tasks]);
  // Split into active vs completed (all tasks Done)
  const completedHires = useMemo(() => allHires.filter(h => {
    const ht = tasks.filter(t => t.hire === h);
    return ht.length > 0 && ht.every(t => t.status === "Done");

/* ── Wireframe Dotted Globe ── */
function WireframeGlobe() {
  const canvasRef = useRef(null);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas || typeof d3 === "undefined") return;
    const ctx = canvas.getContext("2d");
    if (!ctx) return;

    const cw = window.innerWidth;
    const ch = window.innerHeight;
    const radius = Math.min(cw, ch) * 0.35;
    const dpr = window.devicePixelRatio || 1;

    canvas.width = cw * dpr;
    canvas.height = ch * dpr;
    canvas.style.width = cw + "px";
    canvas.style.height = ch + "px";
    ctx.scale(dpr, dpr);

    const projection = d3.geoOrthographic()
      .scale(radius)
      .translate([cw / 2, ch / 2])
      .clipAngle(90);

    const path = d3.geoPath().projection(projection).context(ctx);

    const pointInPoly = (pt, poly) => {
      let inside = false;
      for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
        const [xi, yi] = poly[i], [xj, yj] = poly[j];
        if ((yi > pt[1]) !== (yj > pt[1]) && pt[0] < ((xj - xi) * (pt[1] - yi)) / (yj - yi) + xi) inside = !inside;
      }
      return inside;
    };

    const pointInFeature = (pt, feat) => {
      const g = feat.geometry;
      if (g.type === "Polygon") {
        if (!pointInPoly(pt, g.coordinates[0])) return false;
        for (let i = 1; i < g.coordinates.length; i++) if (pointInPoly(pt, g.coordinates[i])) return false;
        return true;
      } else if (g.type === "MultiPolygon") {
        for (const poly of g.coordinates) {
          if (pointInPoly(pt, poly[0])) {
            let hole = false;
            for (let i = 1; i < poly.length; i++) if (pointInPoly(pt, poly[i])) { hole = true; break; }
            if (!hole) return true;
          }
        }
      }
      return false;
    };

    let landFeatures = null;
    const allDots = [];
    const rotation = [0, -20];

    const render = () => {
      ctx.clearRect(0, 0, cw, ch);
      const sc = projection.scale() / radius;

      // Globe circle
      ctx.beginPath();
      ctx.arc(cw / 2, ch / 2, projection.scale(), 0, Math.PI * 2);
      ctx.fillStyle = "rgba(0,0,0,0.3)";
      ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,0.15)";
      ctx.lineWidth = 1.5 * sc;
      ctx.stroke();

      if (!landFeatures) return;

      // Graticule
      const grat = d3.geoGraticule();
      ctx.beginPath();
      path(grat());
      ctx.strokeStyle = "rgba(255,255,255,0.08)";
      ctx.lineWidth = 0.5 * sc;
      ctx.stroke();

      // Land outlines
      ctx.beginPath();
      landFeatures.features.forEach(f => path(f));
      ctx.strokeStyle = "rgba(255,255,255,0.2)";
      ctx.lineWidth = 0.8 * sc;
      ctx.stroke();

      // Dots
      allDots.forEach(dot => {
        const p = projection([dot[0], dot[1]]);
        if (p && p[0] >= 0 && p[0] <= cw && p[1] >= 0 && p[1] <= ch) {
          ctx.beginPath();
          ctx.arc(p[0], p[1], 1.0 * sc, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(150,150,150,0.6)";
          ctx.fill();
        }
      });
    };

    // Load world data
    fetch("https://raw.githubusercontent.com/martynafford/natural-earth-geojson/refs/heads/master/110m/physical/ne_110m_land.json")
      .then(r => r.json())
      .then(data => {
        landFeatures = data;
        data.features.forEach(feat => {
          const bounds = d3.geoBounds(feat);
          const step = 1.3;
          for (let lng = bounds[0][0]; lng <= bounds[1][0]; lng += step) {
            for (let lat = bounds[0][1]; lat <= bounds[1][1]; lat += step) {
              if (pointInFeature([lng, lat], feat)) allDots.push([lng, lat]);
            }
          }
        });
        render();
      })
      .catch(() => {});

    // Auto-rotate
    let autoRotate = true;
    const timer = d3.timer(() => {
      if (autoRotate) {
        rotation[0] += 0.3;
        projection.rotate(rotation);
        render();
      }
    });

    // Drag interaction
    const handleMouseDown = (e) => {
      autoRotate = false;
      const sx = e.clientX, sy = e.clientY;
      const sr = [...rotation];
      const move = (me) => {
        rotation[0] = sr[0] + (me.clientX - sx) * 0.4;
        rotation[1] = Math.max(-90, Math.min(90, sr[1] - (me.clientY - sy) * 0.4));
        projection.rotate(rotation);
        render();
      };
      const up = () => {
        document.removeEventListener("mousemove", move);
        document.removeEventListener("mouseup", up);
        setTimeout(() => { autoRotate = true; }, 10);
      };
      document.addEventListener("mousemove", move);
      document.addEventListener("mouseup", up);
    };

    const handleWheel = (e) => {
      e.preventDefault();
      const s = e.deltaY > 0 ? 0.95 : 1.05;
      projection.scale(Math.max(radius * 0.4, Math.min(radius * 2.5, projection.scale() * s)));
      render();
    };

    canvas.addEventListener("mousedown", handleMouseDown);
    canvas.addEventListener("wheel", handleWheel, { passive: false });

    const handleResize = () => {
      const w = window.innerWidth, h = window.innerHeight;
      const r = Math.min(w, h) * 0.35;
      canvas.width = w * dpr; canvas.height = h * dpr;
      canvas.style.width = w + "px"; canvas.style.height = h + "px";
      ctx.setTransform(1,0,0,1,0,0); ctx.scale(dpr, dpr);
      projection.translate([w / 2, h / 2]).scale(r);
      render();
    };
    window.addEventListener("resize", handleResize);

    return () => {
      timer.stop();
      canvas.removeEventListener("mousedown", handleMouseDown);
      canvas.removeEventListener("wheel", handleWheel);
      window.removeEventListener("resize", handleResize);
    };
  }, []);

  return (
    <canvas ref={canvasRef} style={{
      position: "absolute", inset: 0, width: "100%", height: "100%",
      zIndex: 0, pointerEvents: "auto",
    }}/>
  );
}

/* ── Login / Hero Page ── */
const APP_PASSWORD = "0904";
const AUTH_KEY = "ee_tracker_auth";

function LoginPage({ onLogin }) {
  const [password, setPassword] = useState("");
  const [error, setError] = useState(false);
  const [showPw, setShowPw] = useState(false);
  const [loading, setLoading] = useState(false);
  const inputRef = useRef(null);

  useEffect(() => { if (inputRef.current) inputRef.current.focus(); }, []);

  const handleSubmit = (e) => {
    e.preventDefault();
    setLoading(true);
    setError(false);
    setTimeout(() => {
      if (password === APP_PASSWORD) {
        sessionStorage.setItem(AUTH_KEY, "1");
        onLogin();
      } else {
        setError(true);
        setLoading(false);
        setPassword("");
        if (inputRef.current) inputRef.current.focus();
      }
    }, 600);
  };

  return (
    <div style={{
      minHeight: "100vh", display: "flex", flexDirection: "column",
      background: "#000", position: "relative", overflow: "hidden",
    }}>

      <WireframeGlobe/>

      <div style={{
        position: "absolute", inset: 0, zIndex: 1, pointerEvents: "none",

      }}/>

      {/* Nav bar */}
      <div style={{
        padding: "24px 40px", display: "flex", alignItems: "center", gap: 10,
        position: "relative", zIndex: 10, animation: "fadeIn 0.8s ease",
      }}>
        <div style={{
          width: 32, height: 32, borderRadius: 8, display: "flex", alignItems: "center",
          justifyContent: "center", background: "rgba(255,255,255,0.06)",
          border: "1px solid rgba(255,255,255,0.12)", backdropFilter: "blur(8px)",
        }}><Icon name="clipboardList" size={16} color="#fff"/></div>
        <span style={{ fontSize: 14, fontWeight: 600, color: "rgba(255,255,255,0.9)", letterSpacing: "0.02em" }}>EE MANAGEMENT</span>
      </div>

      {/* Center content */}
      <div style={{
        flex: 1, display: "flex", alignItems: "center", justifyContent: "center",
        position: "relative", zIndex: 10, padding: "0 20px",
      }}>
        <div style={{ textAlign: "center", maxWidth: 420, width: "100%", animation: "fadeUp 1s ease 0.3s both" }}>

          {/* Shield icon */}
          <div style={{
            width: 56, height: 56, borderRadius: 14, margin: "0 auto 24px",
            display: "flex", alignItems: "center", justifyContent: "center",
            background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)",
            backdropFilter: "blur(12px)",
          }}>
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
              <path d="M9 12l2 2 4-4"/>
            </svg>
          </div>

          <h1 style={{
            fontFamily: "Georgia, serif", fontSize: 40, fontWeight: 700,
            color: "#fff", lineHeight: 1.15, marginBottom: 10, letterSpacing: "-0.03em",
          }}>Probation Tracker</h1>

          <p style={{
            fontSize: 15, color: "rgba(255,255,255,0.45)", lineHeight: 1.6, marginBottom: 36,
          }}>Enter your access code to manage employee<br/>onboarding and probation reviews.</p>

          {/* Login form — glass card */}
          <form onSubmit={handleSubmit} style={{
            width: "100%", maxWidth: 360, margin: "0 auto",
            background: "rgba(255,255,255,0.04)", backdropFilter: "blur(20px)",
            border: "1px solid rgba(255,255,255,0.08)", borderRadius: 16,
            padding: "28px 24px 24px",
          }}>
            <div style={{
              position: "relative", marginBottom: 14,
              animation: error ? "shake 0.4s ease" : "none",
            }}>
              <div style={{
                position: "absolute", left: 14, top: "50%", transform: "translateY(-50%)",
                pointerEvents: "none", display: "flex", alignItems: "center",
              }}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={error ? "#EF4444" : "rgba(255,255,255,0.35)"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
                </svg>
              </div>
              <input
                ref={inputRef}
                type={showPw ? "text" : "password"}
                value={password}
                onChange={e => { setPassword(e.target.value); setError(false); }}
                placeholder="Enter access code"
                autoComplete="off"
                style={{
                  width: "100%", padding: "14px 44px 14px 42px", fontSize: 14,
                  background: "rgba(255,255,255,0.06)",

              />

                  ) : (
                    <><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></>
                  )}
                </svg>
              </button>
            </div>

            {error && (
              <div style={{
                fontSize: 13, color: "#EF4444", marginBottom: 12, display: "flex",
                alignItems: "center", gap: 6, justifyContent: "center", animation: "fadeUp 0.2s ease",
              }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
                </svg>
                Incorrect access code
              </div>
            )}

            <button type="submit" disabled={!password || loading} style={{
              width: "100%", padding: "13px 24px", fontSize: 14, fontWeight: 600,
              borderRadius: 10, border: "none",
              cursor: password && !loading ? "pointer" : "not-allowed",
              color: "#000", letterSpacing: "0.01em",
              background: password && !loading ? "#fff" : "rgba(255,255,255,0.1)",
              transition: "all 200ms ease",
              display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
            }}
              onMouseEnter={e => { if (password && !loading) e.currentTarget.style.background = "rgba(255,255,255,0.9)"; }}
              onMouseLeave={e => { if (password && !loading) e.currentTarget.style.background = "#fff"; }}
            >
              {loading ? (
                <div style={{ width: 18, height: 18, border: "2px solid rgba(0,0,0,0.2)", borderTopColor: "#000", borderRadius: "50%", animation: "spin 0.6s linear infinite" }}/>
              ) : "Sign in"}
            </button>

            <p style={{ fontSize: 11, color: "rgba(255,255,255,0.25)", marginTop: 14, lineHeight: 1.4 }}>
              Contact HR admin if you don't have an access code
            </p>
          </form>
        </div>
      </div>

      {/* Footer */}
      <div style={{
        padding: "20px 40px", textAlign: "center", position: "relative", zIndex: 10,
        animation: "fadeIn 1.2s ease",
      }}>
        <div style={{ display: "flex", justifyContent: "center", gap: 20, fontSize: 11, color: "rgba(255,255,255,0.2)" }}>
          <span>EE Management System</span>
          <span style={{ opacity: 0.5 }}>|</span>
          <span>Confidential</span>
          <span style={{ opacity: 0.5 }}>|</span>
          <span>HR Department</span>
        </div>
      </div>

      {/* Bottom hint */}
      <div style={{
        position: "absolute", bottom: 48, left: 20, fontSize: 10, color: "rgba(255,255,255,0.15)",
        zIndex: 10, padding: "4px 8px", borderRadius: 4, background: "rgba(0,0,0,0.3)",
      }}>
        Drag to rotate globe
      </div>
    </div>
  );
}

/* ── Root with Auth Gate ── */
function Root() {
  const [authed, setAuthed] = useState(() => sessionStorage.getItem(AUTH_KEY) === "1");

  if (!authed) return <LoginPage onLogin={() => setAuthed(true)}/>;
  return <App/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
